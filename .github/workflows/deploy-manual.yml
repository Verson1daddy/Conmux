name: Deploy manual to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/manual/**'
      - '.github/workflows/deploy-manual.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build manual (zh + en)
        run: |
          mdbook build docs/manual
          mdbook build docs/manual/en
          mkdir -p site
          cp -r docs/manual/book site/zh
          cp -r docs/manual/en/book site/en
          cat > site/index.html <<'EOF'
          <!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
          <title>Conmux Manual</title>
          <link rel="alternate" hreflang="zh" href="./zh/">
          <link rel="alternate" hreflang="en" href="./en/">
          <script>
            var lang = (navigator.language || "zh").toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
            location.replace("./" + lang + "/");
          </script>
          <meta http-equiv="refresh" content="1; url=./zh/">
          </head><body><p><a href="./zh/">中文</a> · <a href="./en/">English</a></p></body></html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
